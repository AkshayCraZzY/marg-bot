# =============================================================================
# Marg ERP Monitor Bot — Configuration File
# =============================================================================
# All operational parameters are defined here.
# Changes take effect on the next bot restart unless noted otherwise.
# Do NOT quote string values — configparser does not strip quotes.
# =============================================================================


# =============================================================================
# TELEGRAM
# =============================================================================
[telegram]

# Bot token from @BotFather
bot_token           = 806xxxxxxx

# Telegram chat ID of the authorised operator (only this ID can issue commands)
chat_id             = 51xxxxxx

# Seconds between each Telegram update poll (1-60)
poll_interval       = 2


# =============================================================================
# WHATSAPP  (Green API)
# =============================================================================
[whatsapp]

# Set to true to enable WhatsApp integration
enabled             = true

# Green API credentials — get from app.green-api.com
id_instance         = 710xxx
token_instance      = 9b53exxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# WhatsApp group chat ID for WCR/TFR bill reports
# Format: 120363XXXXXXXXXX@g.us
group_id            = 918xxxxxxxxxxxxxx@g.us

# Individual WhatsApp chat for /party PDF delivery (separate from the group above)
# Format: country_code + number + @c.us  e.g. 919876543210@c.us
# Leave blank to disable WhatsApp PDF forwarding for /party
party_pdf_chat_id   = 9190xxxxxx@c.us


# =============================================================================
# GOOGLE CLOUD VISION  (OCR)
# =============================================================================
[google]

# API key for Google Cloud Vision — used for bill screenshot OCR
# How to get: console.cloud.google.com -> Enable Cloud Vision API -> Credentials -> Create API Key
# Free tier: 1000 units/month (well within daily usage at this volume)
vision_api_key      = AIzxxxxxxxxxxxxx


# =============================================================================
# MARG ERP APPLICATION
# =============================================================================
[marg]

# Window title fragment used to find the Marg ERP window via EnumWindows
window_title        = MARG ERP

# Absolute path to the Marg ERP desktop shortcut (.lnk)
# Used by the /restart_margerp command to relaunch Marg ERP
shortcut            = C:\Users\autobot\Desktop\MARG.lnk

# Credentials for the Marg ERP bot login account
# Used during /restart_margerp to log in after relaunch
login_user          = xxx
login_password      = xxx

# Seconds to wait after launching Marg ERP before attempting login
# Increase if the server is slow to load Marg ERP
login_wait_s        = 15

# Folder ID component of the ledger PDF output path
# Ledger PDF is saved to: C:/Users/Public/MARG/{marg_folder_id}/ledger.PDF
marg_folder_id      = xxxxx


# =============================================================================
# MARG ERP NAVIGATION
# =============================================================================
# Keypress filter strings used during Marg ERP UI automation.
# Adjust if Marg ERP is upgraded and menu structure changes.
[marg_nav]

# String typed into the bill filter field — shows both WCR and WCA series
# "wc" matches WCR (warehouse consignment) and WCA (new series)
bill_filter_prefix  = a

# Store filter string typed during TFR navigation
tfr_store_filter    = store

# Branch filter string typed during TFR navigation (matches Gangapur branch)
tfr_branch_filter   = ganga


# =============================================================================
# TIMING DELAYS
# =============================================================================
# All values are in seconds. Increase if Marg ERP is slow to respond.
[delays]

# Wait after pressing Enter to select/open an item
enter_select        = 0.2

# Wait after typing a filter string for results to load
after_filter        = 0.2

# Wait before capturing a screenshot to let the screen fully render
before_capture      = 0.5

# Wait after pressing Escape before the next action
after_esc           = 0.2

# Seconds to wait for the Marg ERP backup process to complete
# Increase if backups are large and need more time
backup_wait_time    = 25


# =============================================================================
# SCHEDULE
# =============================================================================
# All times are in 24-hour HH:MM format (local server time).
[schedule]

# Time to send the daily automated WCR + TFR report
daily_report_time       = 20:15

# Time to automatically restart Marg ERP each morning (ensures a clean session)
marg_restart_time       = 07:45

# Time to run the automated daily backup
backup_schedule_time    = 07:50

# Minute past each hour when the health ping (bot alive) message is sent
# e.g. 0 = pings at 08:00, 09:00, 10:00
health_ping_minute      = 0

# Whether each scheduled task skips Sundays
# true  = task does not run on Sunday
# false = task runs every day including Sunday
report_skip_sunday      = true
restart_skip_sunday     = false
backup_skip_sunday      = true


# =============================================================================
# ALERTS
# =============================================================================
[alerts]

# If today's pending WCR/WCA bill count reaches or exceeds this number,
# a high-pending alert is sent to the WhatsApp group
bill_alert_threshold    = 5

# Number of previous working days to check for undelivered bills (in addition to today)
# e.g. 2 = today + last 2 working days. Sundays are always skipped.
undelivered_check_days  = 5

# Maximum bills visible per page in the WCR/WCA list screen
# When the first OCR pass returns exactly this many bills, the system
# scrolls down and performs a second OCR pass to catch overflow entries
wcr_page_limit          = 14


# =============================================================================
# FILES & STORAGE
# =============================================================================
[files]

# Absolute path to the rotating log file
log_file            = C:\xxxxxxx\marg_agent.log

# Directory where automation screenshots are saved for debugging
screenshot_dir      = C:\xxxxxxx\screenshots

# Directory where outstanding report PDFs are temporarily stored
ledger_temp_dir     = C:\xxxxxxx\ledger_temp

# Storage size limits in megabytes — oldest files deleted first when exceeded
# Pruning runs automatically after each write and once at startup
max_logs_mb         = 1
max_screenshots_mb  = 20
max_ledger_temp_mb  = 2


# =============================================================================
# SCREEN CAPTURE REGIONS
# =============================================================================
# Pixel coordinates of the areas captured for OCR and screenshots.
# Use the calibration tool to set correct values for your screen resolution:
#   python calibrate.py wcr    -- calibrate WCR bill list region
#   python calibrate.py tfr    -- calibrate TFR transfers region
#   python calibrate.py party  -- calibrate party search results region

[region_wcr]
# Region containing the WCR/WCA undelivered bills list
calibrated  = true
left        = 55
top         = 130
right       = 650
bottom      = 615

[region_tfr]
# Region containing the TFR Gangapur transfer list
calibrated  = true
left        = 0
top         = 125
right       = 950
bottom      = 630

[region_party]
# Region containing the party ledger search results
calibrated  = true
left        = 30
top         = 200
right       = 1190
bottom      = 540
